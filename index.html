<!DOCTYPE html>
<html lang="en" id="htmlElement">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle"></title>
  <meta name="description" id="pageDescription" content="" />
  <!-- Needed for dynamic projects/courses on localhost (GitHub API needs owner/repo) -->
  <script>
    // Change these if your GitHub username/repo name are different
    window.REPO_CONFIG = window.REPO_CONFIG || { owner: "alixahedi", repo: "Alixahedi.github.io" };
  </script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <div class="navbar">
    <nav id="navlinks" class="navlinks">
      <button class="close-btn" aria-label="Close menu" id="closeBtn">×</button>
      <a href="#" id="navHome">Home</a>
      <a href="#resume" id="navResume">Resume</a>
      <a href="#projects" id="navProjects">Projects</a>
      <a href="#courses" id="navCourses">Courses</a>
      <a href="#contact" id="navContact">Contact</a>
    </nav>
    <div class="header-controls">
      <button id="langToggle" class="lang-toggle" aria-label="Toggle language" title="Switch to Farsi">فا</button>
      <button id="menuBtn" class="menu-btn" aria-label="Menu">☰</button>
    </div>
  </div>
</header>

<main>
  <section class="hero container">
    <div class="card card--section hero-panel">
      <header class="section-head section-head--hero">
        <h1 id="heroTitle" class="section-head__title"></h1>
      </header>
      <div class="section-body">
        <p class="subtitle" id="heroSubtitle"></p>
        <p class="desc" id="heroDesc"></p>
        <div class="cta">
          <!-- Social links will be populated by script.js -->
        </div>
      </div>
    </div>
    <div class="hero-visual">
      <img src="assets/img/avatar.jpg" alt="Portrait"/>
    </div>
  </section>

  <!-- Decorative scroll hint (mouse) between hero and About — not interactive -->
  <div class="scroll-hint-band" aria-hidden="true">
    <div class="scroll-mouse">
      <span class="scroll-mouse__wheel"></span>
    </div>
  </div>

  <section id="about" class="section container">
    <div class="card card--section">
      <header class="section-head">
        <h2 id="aboutTitle" class="section-head__title"></h2>
      </header>
      <div class="section-body">
        <p id="homeContent"></p>
        <div class="highlights home-highlights">
          <div class="highlight"><div class="num" id="yearsNum"></div><div class="txt" id="yearsText"></div></div>
          <div class="highlight"><div class="num" id="projectsNum"></div><div class="txt" id="projectsText"></div></div>
          <div class="highlight"><div class="num" id="domainsNum"></div><div class="txt" id="domainsText"></div></div>
        </div>
      </div>
    </div>
  </section>

  <section id="resume" class="section container resume-page">
    <div id="skills" class="card card--section resume-block-card">
      <header class="section-head section-head--sub">
        <h3 id="skillsTitle" class="section-head__title"></h3>
      </header>
      <div class="section-body">
        <div class="skills-bars">
          <!-- Skills will be populated by JS from content.js -->
        </div>
      </div>
    </div>

    <div id="education" class="card card--section resume-block-card">
      <header class="section-head section-head--sub">
        <h3 id="educationTitle" class="section-head__title">Education</h3>
      </header>
      <div class="section-body section-body--resume">
        <div id="educationList" class="resume-list">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

    <div id="experience" class="card card--section resume-block-card">
      <header class="section-head section-head--sub">
        <h3 id="experienceTitle" class="section-head__title">Experience</h3>
      </header>
      <div class="section-body section-body--resume">
        <div id="experienceList" class="resume-list">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

    <div class="card card--section resume-block-card resume-dl-card">
      <div class="resume-dl-panel">
        <div class="resume-dl-visual" aria-hidden="true">
          <div class="resume-dl-orbit"></div>
          <div class="resume-dl-docstack">
            <div class="resume-dl-doc resume-dl-doc--shadow"></div>
            <div class="resume-dl-doc resume-dl-doc--main">
              <span class="resume-dl-doc__fold"></span>
              <div class="resume-dl-doc__lines">
                <span></span><span></span><span></span><span></span>
              </div>
              <span class="resume-dl-doc__chip">PDF</span>
            </div>
          </div>
        </div>
        <div class="resume-dl-copy">
          <h3 id="resumeDownloadTitle" class="resume-dl-title"></h3>
          <p id="resumeDesc" class="resume-dl-desc"></p>
          <a id="resumeDownloadBtn" class="resume-dl-btn" href="assets/Resume.pdf" download>
            <span class="resume-dl-btn__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3v10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M7 11l5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 21h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="resume-dl-btn__text" id="resumeDownloadBtnLabel">Download Resume (PDF)</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <section id="projects" class="section container">
    <div class="card card--section">
      <header class="section-head">
        <h2 id="projectsTitle" class="section-head__title"></h2>
      </header>
      <div class="section-body section-body--grid">
        <div class="grid cols-3">
          <!-- Projects will be populated by JS from content.js -->
        </div>
      </div>
    </div>
  </section>

  <section id="courses" class="section container">
    <div class="card card--section">
      <header class="section-head">
        <h2 id="coursesTitle" class="section-head__title"></h2>
      </header>
      <div class="section-body section-body--grid">
        <div class="grid cols-3">
          <!-- Courses will be populated by JS from content.js -->
        </div>
      </div>
    </div>
  </section>

  <section id="contact" class="section container">
    <div class="card card--section">
      <header class="section-head">
        <h2 id="contactTitle" class="section-head__title"></h2>
      </header>
      <div class="section-body">
        <div class="contact">
          <!-- Social links will be populated by script.js -->
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p>© <span id="year"></span> Ali Zhedi. All rights reserved.</p>
  </div>
</footer>

<script src="content.js"></script>
<script src="dynamic-content.js"></script>
<script src="gallery.js"></script>
<script src="populate.js"></script>
<script src="script.js"></script>
</body>
</html>
